<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implementando o chartJS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="display: flex;">

    <div style="position: relative; height:40vh; width:40vw">
    <canvas id="graficoLinha"></canvas>
</div>

<div style="position: relative; height:40vh; width:40vw">
    <canvas id="graficoBarra"></canvas>
</div>

</body>

<script>
const ctx1 = document.getElementById('graficoLinha');

new Chart(ctx1, {
    type: 'line',
    data: {
        labels: ['12:00', '13:00', '14:00', '15:00', '16:00', '17:00'],
        datasets: [
            {
                label: 'Temperatura',
                data: [30, 29, 28, 25, 22, 23],
                borderWidth: 2,
                backgroundColor: 'red',
                borderColor: 'red',
            },
            {
                label: 'Umidade',
                data: [80, 82, 80, 85, 80, 83],
                borderWidth: 2,
                backgroundColor: 'blue',
                borderColor: 'blue',
            }
        ]
    },
    options: {
        responsive: true
    }
});
</script>
 <script>
const ctx2 = document.getElementById('graficoBarra');

new Chart(ctx2, {
    type: 'bar',
    data: {
        labels: ['Janeiro', 'Fevereiro', 'Março','Abril','Maio','Junho'],
        datasets: [
            {
                label: 'Temperatura Média',
                data: [22, 24, 27, 23, 20, 18],
                borderWidth: 2,
                backgroundColor: 'red',
                borderColor: 'red',
            },
            {
                label: 'Umidade Média',
                data: [90, 89, 93, 87, 88, 82],
                borderWidth: 2,
                backgroundColor: 'blue',
                borderColor: 'blue',
            }
        ]
    },
    options: {
        responsive: true
    }
});
</script>


</html>
